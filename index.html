<!DOCTYPE html>

    <script>
      // Global error tracker to diagnose blank pages
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#0a0e14';
        div.style.color = '#ff5566';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1 style="font-size:20px;margin-bottom:15px;color:#ff5566">[!] Runtime Error</h1>' +
          '<pre style="background:#10151c;padding:15px;border-radius:4px;border:1px solid #1c2530;color:#d7e0ea">' +
          e.message + '\n' + e.filename + ':' + e.lineno + '\n\nStack:\n' + (e.error ? e.error.stack : '') + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#0a0e14';
        div.style.color = '#ff5566';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1 style="font-size:20px;margin-bottom:15px;color:#ff5566">[!] Unhandled Promise Rejection</h1>' +
          '<pre style="background:#10151c;padding:15px;border-radius:4px;border:1px solid #1c2530;color:#d7e0ea">' +
          e.reason + '</pre>';
        document.body.appendChild(div);
      });
    </script>
